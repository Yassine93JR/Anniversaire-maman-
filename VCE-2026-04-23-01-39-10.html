<!DOCTYPE html><html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Joyeux Anniversaire Maman 🎉</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(-45deg, #ff9a9e, #fbc2eb, #a1c4fd, #fddb92);
      background-size: 400% 400%;
      animation: gradientBG 8s ease infinite;
      font-family: 'Segoe UI', sans-serif;
      overflow: hidden;
      padding: 20px;
    }@keyframes gradientBG {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

.container {
  text-align: center;
  color: white;
  max-width: 500px;
  width: 100%;
}

h1 {
  font-size: clamp(1.8em, 6vw, 3.5em);
  animation: float 3s ease-in-out infinite;
  text-shadow: 0 0 20px rgba(0,0,0,0.3);
  margin: 0;
}

@keyframes float {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
}

.date {
  font-size: clamp(1em, 4vw, 1.5em);
  margin-top: 10px;
}

.from {
  margin-top: 20px;
  font-size: clamp(1em, 4vw, 1.3em);
  font-weight: bold;
}

.cake {
  margin-top: 25px;
  position: relative;
}

.candle {
  width: 10px;
  height: 40px;
  background: repeating-linear-gradient(45deg, yellow, orange 5px);
  margin: auto;
  border-radius: 3px;
  position: relative;
}

.flame {
  width: 12px;
  height: 18px;
  background: radial-gradient(circle, #ff0, orange, red);
  border-radius: 50%;
  position: absolute;
  top: -18px;
  left: -1px;
  animation: flicker 0.2s infinite alternate;
}

@keyframes flicker {
  from { transform: scale(1); opacity: 1; }
  to { transform: scale(1.2); opacity: 0.7; }
}

.balloon {
  position: absolute;
  bottom: -100px;
  width: 30px;
  height: 40px;
  border-radius: 50%;
  animation: rise 6s linear infinite;
}

@keyframes rise {
  to {
    transform: translateY(-120vh);
  }
}

.confetti {
  position: absolute;
  width: 6px;
  height: 6px;
  top: -10px;
  animation: fall linear infinite;
}

@keyframes fall {
  to {
    transform: translateY(100vh) rotate(720deg);
  }
}

  </style>
</head>
<body>  <div class="container">
    <h1>🎂 Joyeux Anniversaire Maman 🎉</h1>
    <div class="date">Jeudi 23 Avril 2026</div><div class="cake">
  <div class="candle">
    <div class="flame"></div>
  </div>
</div>

<div class="from">❤️ De la part de Marwane, Manel et Yassine ❤️</div>

  </div>  <script>
    function createConfetti() {
      const el = document.createElement('div');
      el.className = 'confetti';
      document.body.appendChild(el);

      el.style.left = Math.random() * window.innerWidth + 'px';
      el.style.backgroundColor = `hsl(${Math.random()*360},100%,50%)`;
      el.style.animationDuration = (Math.random()*3+2)+'s';

      setTimeout(() => el.remove(), 5000);
    }

    setInterval(createConfetti, 80);

    function createBalloon() {
      const b = document.createElement('div');
      b.className = 'balloon';
      document.body.appendChild(b);

      b.style.left = Math.random() * window.innerWidth + 'px';
      b.style.backgroundColor = `hsl(${Math.random()*360},100%,60%)`;
      b.style.animationDuration = (Math.random()*3+4)+'s';

      setTimeout(() => b.remove(), 7000);
    }

    setInterval(createBalloon, 800);
  </script></body>
</html>
